CONFIG_GPIO=y

# nrfx UARTE0 owned directly (single UART, runtime pin-swap)
CONFIG_NRFX_UARTE0=y

# RTT for debug (UART0 hardware is used for GPS/modem)
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# BLE + Nordic UART Service (NUS) for phone connection
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_NUS=y
CONFIG_BT_DEVICE_NAME="AKT-01"
CONFIG_BT_MAX_CONN=1

# FPU for double-precision GPS coordinates
CONFIG_FPU=y

# GPIOTE for interrupt-driven button
CONFIG_NRFX_GPIOTE=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
